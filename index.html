<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Zhirmand Coins Store</title>
    <style>
        body { font-family: sans-serif; background-color: #001f3f; color: white; text-align: center; padding: 20px; }
        .store-card { background: linear-gradient(145deg, #003366, #001f3f); border: 3px solid #ffde59; border-radius: 20px; padding: 25px; width: 320px; margin: 20px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { color: #ffde59; text-shadow: 2px 2px 10px rgba(255, 222, 89, 0.5); }
        img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ffde59; }
        .price-list { text-align: right; margin: 20px 0; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .price-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ffde59; padding: 8px 0; }
        .coin-icon { color: #ffde59; font-weight: bold; }
        .buy-btn { background: #ffde59; color: black; padding: 15px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-top: 20px; font-size: 18px; transition: 0.3s; }
        .buy-btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>دوکانێ ژیرمەند بۆ کۆینێن eFootball</h1>
    <div class="store-card">
        <img src="https://static.independent.co.uk/2023/07/16/01/Messi_Inter_Miami.jpg" alt="Messi Inter Miami">
        
        <div class="price-list">
            <div class="price-item"><span>1000 Coins</span> <span class="coin-icon">5,000 IQD</span></div>
            <div class="price-item"><span>3000 Coins</span> <span class="coin-icon">12,000 IQD</span></div>
            <div class="price-item"><span>5000 Coins</span> <span class="coin-icon">20,000 IQD</span></div>
        </div>

        <p style="font-size: 14px; color: #ccc;">پشتی پارە هاتە فرێکرن، کۆین دێ چنە سەر ئەکاونتێ تە.</p>
        
        <a href="https://www.snapchat.com/add/zhirmand" class="buy-btn">بۆ کڕینێ مەسجێ ل سناپچاتی بفرێکه</a>
    </div>
</body>
</html>
