<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zako Coins PES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #000b1a; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .app-container {
            background: linear-gradient(145deg, #001f3f, #000b1a);
            width: 90%;
            max-width: 380px;
            border-radius: 35px;
            padding: 25px;
            border: 2px solid #ffde59;
            text-align: center;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; 
            color: #ffde59;
            margin-bottom: 10px;
        }

        .sub-title { font-size: 14px; color: #aaa; margin-bottom: 20px; }

        .price-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255, 222, 89, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info { display: flex; justify-content: space-between; align-items: center; }
        .coin-amount { font-weight: bold; font-size: 20px; color: #ffde59; }
        .price-tag { font-size: 18px; color: #fff; }

        .buy-btn {
            background: linear-gradient(90deg, #ffde59, #ff914d);
            color: #000;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .buy-btn:hover { transform: scale(1.03); opacity: 0.9; }

        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Zako Coins PES</h1>
        <p class="sub-title">ئەرزانترین و خێراترین کڕینا کۆینان</p>

        <div class="price-card">
            <div class="info">
                <span class="coin-amount">1000 Coins</span>
                <span class="price-tag">5,000 IQD</span>
            </div>
            <a href="https://www.snapchat.com/add/Zakarya.reka200?share_id=1000_Coins" class="buy-btn">🛒 نوکە بکڕە (Order Now)</a>
        </div>

        <div class="price-card">
            <div class="info">
                <span class="coin-amount">3000 Coins</span>
                <span class="price-tag">12,000 IQD</span>
            </div>
            <a href="https://www.snapchat.com/add/Zakarya.reka200?share_id=3000_Coins" class="buy-btn">🛒 نوکە بکڕە (Order Now)</a>
        </div>

        <div class="price-card">
            <div class="info">
                <span class="coin-amount">5000 Coins</span>
                <span class="price-tag">20,000 IQD</span>
            </div>
            <a href="https://www.snapchat.com/add/Zakarya.reka200?share_id=5000_Coins" class="buy-btn">🛒 نوکە بکڕە (Order Now)</a>
        </div>

        <p class="footer">Verified Seller • Fast Transfer ⚡</p>
    </div>
</body>
</html>
