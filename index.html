<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوکانێ ژیرمه‌ند</title>
    <style>
        @keyframes glow {
            0% { text-shadow: 0 0 5px #ffde59; }
            50% { text-shadow: 0 0 20px #ffde59, 0 0 30px #ff914d; }
            100% { text-shadow: 0 0 5px #ffde59; }
        }
        body { 
            font-family: sans-serif; 
            background-color: #000b1a; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .app-container {
            background: #001f3f;
            width: 90%;
            max-width: 360px;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid #ffde59;
            box-shadow: 0 0 25px rgba(255, 222, 89, 0.2);
            text-align: center;
        }
        h1 { 
            color: #ffde59; 
            font-size: 24px; 
            animation: glow 2s infinite;
        }
        .messi-img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 2px solid #ffde59;
            margin: 15px 0;
            display: block;
        }
        .price-card {
            background: #003366;
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 5px solid #ffde59;
        }
        .coin-amount { font-weight: bold; font-size: 18px; color: #ffde59; }
        .buy-now {
            background: linear-gradient(90deg, #ffde59, #ff914d);
            color: #000;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 222, 89, 0.4);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>✨ دوکانێ ژیرمه‌ند ✨</h1>
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Lionel_Messi_20180626.jpg" class="messi-img" alt="Messi">

        <div class="price-card">
            <span class="coin-amount">1000 Coins</span>
            <span>5,000 IQD</span>
        </div>
        <div class="price-card">
            <span class="coin-amount">3000 Coins</span>
            <span>12,000 IQD</span>
        </div>
        <div class="price-card">
            <span class="coin-amount">5000 Coins</span>
            <span>20,000 IQD</span>
        </div>

        <a href="https://www.snapchat.com/add/Zakarya.reka200" class="buy-now">📲 نوکە ب سناپچاتی بکڕە</a>
        <p style="font-size: 12px; margin-top: 15px; color: #888;">Safe & Fast Transfer ⚡</p>
    </div>
</body>
</html>
