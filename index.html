<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zako Coins PES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');

        @keyframes glow {
            0% { text-shadow: 0 0 5px #ffde59; color: #ffde59; }
            50% { text-shadow: 0 0 20px #ffde59, 0 0 30px #ff914d; color: #fff; }
            100% { text-shadow: 0 0 5px #ffde59; color: #ffde59; }
        }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #000b1a; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .app-container {
            background: linear-gradient(145deg, #001f3f, #000b1a);
            width: 90%;
            max-width: 380px;
            border-radius: 35px;
            padding: 25px;
            border: 2px solid #ffde59;
            box-shadow: 0 0 30px rgba(255, 222, 89, 0.15);
            text-align: center;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 26px; 
            margin-bottom: 20px;
            animation: glow 2.5s infinite ease-in-out;
        }

        /* ئەڤە وێنەیێ کۆینێ زێڕینی یێ ب کۆدی دروستکری */
        .coin-svg {
            width: 150px;
            height: 150px;
            margin: 10px auto 20px;
            filter: drop-shadow(0 0 10px #ffde59);
        }

        .price-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px 20px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffde59;
        }

        .coin-amount { font-weight: bold; font-size: 19px; color: #ffde59; }

        .buy-now {
            background: linear-gradient(90deg, #ffde59, #ff914d);
            color: #000;
            padding: 18px 10px;
            border-radius: 50px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(255, 222, 89, 0.3);
        }

        .footer-text { font-size: 11px; margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Zako Coins PES</h1>
        
        <div class="coin-svg">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#ffde59" stroke="#fff" stroke-width="2"/>
                <circle cx="50" cy="50" r="35" fill="none" stroke="#b8860b" stroke-width="2" stroke-dasharray="5,3"/>
                <text x="50" y="65" font-family="Arial" font-size="40" font-weight="bold" fill="#b8860b" text-anchor="middle">C</text>
            </svg>
        </div>

        <div class="price-card">
            <span class="coin-amount">1000 Coins</span>
            <span>5,000 IQD</span>
        </div>
        <div class="price-card">
            <span class="coin-amount">3000 Coins</span>
            <span>12,000 IQD</span>
        </div>
        <div class="price-card">
            <span class="coin-amount">5000 Coins</span>
            <span>20,000 IQD</span>
        </div>

        <a href="https://www.snapchat.com/add/Zakarya.reka200" class="buy-now">📲 بو پتر پیزانینا سه را دانا سناپچانی مه بكه</a>
        
        <p class="footer-text">Verified Seller • Fast Delivery</p>
    </div>
</body>
</html>
